version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: urlshortener-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: urlshortener
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"          # host 3307 → container 3306
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - urlshortener-net

  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    ports:
      - "6380:6379"          # host 6380 → container 6379
    networks:
      - urlshortener-net

  app:
    build: .
    container_name: urlshortener-app
    ports:
      - "8081:8080"          
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/urlshortener?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: userpassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - urlshortener-net

volumes:
  mysql-data:

networks:
  urlshortener-net: